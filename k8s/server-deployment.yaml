apiVersion: apps/v1
kind: Deployment
metadata:
  name: suvidha-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: suvidha-server
  template:
    metadata:
      labels:
        app: suvidha-server
    spec:
      containers:
        - name: suvidha-server
          image: suvidha-server:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: suvidha-server-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: suvidha-server-secrets
                  key: JWT_SECRET
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: suvidha-server-secrets
                  key: HMAC_SECRET
            - name: CORS_ORIGIN
              value: https://kiosk.suvidha.gov
            - name: KIOSK_DEVICE_KEYS
              valueFrom:
                secretKeyRef:
                  name: suvidha-server-secrets
                  key: KIOSK_DEVICE_KEYS
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: suvidha-server
spec:
  selector:
    app: suvidha-server
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
