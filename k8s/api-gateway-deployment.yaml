apiVersion: apps/v1
kind: Deployment
metadata:
  name: suvidha-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: suvidha-api-gateway
  template:
    metadata:
      labels:
        app: suvidha-api-gateway
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: suvidha-api-gateway
          image: suvidha-api-gateway:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: CORS_ORIGIN
              value: https://kiosk.suvidha.gov
            - name: AUTH_SERVICE_URL
              value: http://suvidha-auth-service:5101
            - name: PAYMENT_SERVICE_URL
              value: http://suvidha-payment-fraud-service:5102
            - name: NOTIFICATION_SERVICE_URL
              value: http://suvidha-notification-service:5104
            - name: CORE_SERVICE_URL
              value: http://suvidha-server:5000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: suvidha-api-gateway
spec:
  selector:
    app: suvidha-api-gateway
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
