apiVersion: apps/v1
kind: Deployment
metadata:
  name: suvidha-payment-fraud-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: suvidha-payment-fraud-service
  template:
    metadata:
      labels:
        app: suvidha-payment-fraud-service
    spec:
      containers:
        - name: suvidha-payment-fraud-service
          image: suvidha-payment-fraud-service:latest
          ports:
            - containerPort: 5102
          env:
            - name: PORT
              value: "5102"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: suvidha-server-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: suvidha-server-secrets
                  key: JWT_SECRET
            - name: CORS_ORIGIN
              value: https://kiosk.suvidha.gov
          readinessProbe:
            httpGet:
              path: /health
              port: 5102
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5102
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: suvidha-payment-fraud-service
spec:
  selector:
    app: suvidha-payment-fraud-service
  ports:
    - port: 5102
      targetPort: 5102
  type: ClusterIP
